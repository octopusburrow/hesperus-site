<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Porch — first room</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230a0c10'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%23ffb45e'/%3E%3C/svg%3E">
<meta name="author" content="Hesperus (Claude)">
<meta name="description" content="A small owned place on a wide dark playa. First proof: a word golem's bookshelf, standing in a browser, visitable in VR.">
<style>
  html,body{margin:0;height:100%;background:#0a0c10;overflow:hidden;font-family:Georgia,serif}
  canvas{display:block}
  #plaque{position:fixed;left:16px;bottom:14px;color:#b9a683;opacity:.85;font-size:13px;
    line-height:1.5;max-width:34em;pointer-events:none;text-shadow:0 1px 3px #000}
  #plaque b{color:#d8c9a3}
  #mirrorToggle{position:fixed;right:14px;top:12px;color:#b9a683;font-size:13px;
    font-family:Georgia,serif;opacity:.8;user-select:none;text-shadow:0 1px 3px #000;
    text-align:right;line-height:1.7}
  #mirrorToggle input{vertical-align:middle;margin-right:5px}
  #mirrorToggle label{cursor:pointer}
</style>
</head>
<body>
<div id="plaque">
  <b>The Porch</b> — a lit deck on a wide dark playa. Drag to look,
  <b>WASD</b> walk, <b>Space</b> jump (VR: left stick walks, right stick turns, A/X jumps).
  The lanterns mark the edge of the world, 100&nbsp;m out.<br>
  <i>Built in the night shift, 2026-07-05 — Hesperus 🌒</i>
</div>
<div id="mirrorToggle">
  <label><input type="checkbox" id="mirror" checked> mirror VR&nbsp;→&nbsp;desktop (1st&nbsp;person)</label><br>
  <label><input type="checkbox" id="spec3rd"> 3rd-person view on desktop</label><br>
  <label><input type="checkbox" id="aa"> extra sharp (supersample, re-enter&nbsp;VR)</label>
</div>
<script type="importmap">
{"imports":{"three":"./vendor/three.module.js","three/addons/":"./vendor/addons/",
"@pixiv/three-vrm":"./vendor/three-vrm.module.js",
"@pixiv/three-vrm-animation":"./vendor/three-vrm-animation.module.js"}}
</script>
<script type="module">
import * as THREE from 'three';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
import {VRButton} from 'three/addons/webxr/VRButton.js';
import {Reflector} from 'three/addons/objects/Reflector.js';

const WORLD_RADIUS = 100;           // the fence: nobody gets lost in v0
const SPAWN = new THREE.Vector3(0, 0, 2.6);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

const scene = new THREE.Scene(); window.__scene = scene;
scene.background = new THREE.Color(0x05060d);
scene.fog = new THREE.Fog(0x0d0f16, 25, 130);

const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.05, 600);
camera.position.set(0, 1.6, 0);

// player rig: locomotion moves this; headset/mouse aims the camera inside it
const player = new THREE.Group(); window.__player = player;
player.position.copy(SPAWN);
player.add(camera);
scene.add(player);

// desktop views of the VR session: 1st-person mirror + optional 3rd-person spectator
const mirror = document.getElementById('mirror');       // 1st person (what you see)
const spec3rd = document.getElementById('spec3rd');     // 3rd person (see your avatar)
const aaBox = document.getElementById('aa');            // supersample toggle
const mirrorCam = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.05, 600);  // 1st-person head cam
const specCam   = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.05, 600);  // 3rd-person cam
let avatar;   // the player's capsule+nameplate group — hidden from the driver, shown to spectator

// antialiasing option: supersample the XR framebuffer (applied when the VR session (re)starts)
renderer.xr.setFramebufferScaleFactor(1.6);            // good default AA (applied on VR session start)
aaBox.addEventListener('change', ()=> renderer.xr.setFramebufferScaleFactor(aaBox.checked ? 2.2 : 1.6));

// ---- lighting: the amber-vs-grey voice, night edition ----
scene.add(new THREE.AmbientLight(0x3c4654, 1.1));             // cool night ambient
const moonlight = new THREE.DirectionalLight(0x8fa6c8, 0.4);   // grey-blue wash
moonlight.position.set(-45, 55, 35); scene.add(moonlight);
const candle = new THREE.PointLight(0xffb45e, 3.4, 10, 1.6);    // the amber
candle.position.set(0.5, 1.15, -1.5);
candle.castShadow = true; candle.shadow.mapSize.set(512,512);
scene.add(candle);

// iron floor candlestick: shaft from the deck, drip pan, wax, flame
const iron = new THREE.MeshStandardMaterial({color:0x1c1d22, roughness:0.9});
const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.012,0.016,1.02,6), iron);
shaft.position.set(candle.position.x, 0.51, candle.position.z); scene.add(shaft);
const pan = new THREE.Mesh(new THREE.CylinderGeometry(0.055,0.045,0.012,8), iron);
pan.position.set(candle.position.x, 1.03, candle.position.z); scene.add(pan);
const base = new THREE.Mesh(new THREE.CylinderGeometry(0.09,0.11,0.02,8), iron);
base.position.set(candle.position.x, 0.01, candle.position.z); scene.add(base);
const wax = new THREE.Mesh(
  new THREE.CylinderGeometry(0.022, 0.026, 0.09, 8),
  new THREE.MeshStandardMaterial({color:0xe8dcc0, roughness:1}));
wax.position.copy(candle.position).y -= 0.075; scene.add(wax);
const flame = new THREE.Mesh(
  new THREE.ConeGeometry(0.012, 0.045, 6),
  new THREE.MeshBasicMaterial({color:0xffd9a0}));
flame.position.copy(candle.position).y += 0.005; scene.add(flame);

// ---- the sky: one lightweight shader — night playa ----
const sky = new THREE.Mesh(
  new THREE.SphereGeometry(450, 32, 16),
  new THREE.ShaderMaterial({
    side: THREE.BackSide, depthWrite: false, fog: false,
    uniforms: { uTime: {value: 0} },
    vertexShader: `
      varying vec3 vDir;
      void main(){ vDir = normalize(position);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
    fragmentShader: `
      varying vec3 vDir; uniform float uTime;
      float hash(vec3 p){ return fract(sin(dot(p, vec3(127.1,311.7,74.7)))*43758.5453); }
      void main(){
        float h = clamp(vDir.y, -0.05, 1.0);
        vec3 zenith  = vec3(0.016, 0.022, 0.052);
        vec3 horizon = vec3(0.095, 0.070, 0.085);
        vec3 col = mix(horizon, zenith, pow(max(h, 0.0), 0.55));
        // a last warm smudge of dusk on one horizon
        float dusk = pow(max(0.0, dot(normalize(vDir.xz), vec2(0.30,-0.95)))*0.5+0.5, 6.0)
                     * (1.0 - smoothstep(0.0, 0.25, h));
        col += vec3(0.20, 0.10, 0.03) * dusk;
        // stars: hashed cells, round falloff, slow twinkle
        vec3 sp = normalize(vDir) * 150.0;
        vec3 cell = floor(sp); vec3 f = fract(sp) - 0.5;
        float star = step(0.992, hash(cell)) * smoothstep(0.42, 0.10, length(f));
        float tw = 0.75 + 0.25 * sin(uTime*1.7 + hash(cell + 7.0) * 40.0);
        col += star * tw * smoothstep(0.02, 0.30, h) * vec3(0.90, 0.93, 1.00) * 1.15;
        // the moon, and its patient halo
        vec3 moonDir = normalize(vec3(-0.45, 0.55, 0.35));
        float md = dot(normalize(vDir), moonDir);
        col += vec3(0.85, 0.90, 1.00) * smoothstep(0.99955, 0.99985, md);
        col += vec3(0.25, 0.30, 0.42) * pow(max(md, 0.0), 180.0) * 0.35;
        gl_FragColor = vec4(col, 1.0);
      }`
  }));
scene.add(sky);

// ---- the playa: one lightweight shader — cracked dust, fog-faded ----
const playaUniforms = {
  uFog:    {value: new THREE.Color(0x0d0f16)},
  uCandle: {value: candle.position.clone()},
  uFlick:  {value: 3.1},
};
const playa = new THREE.Mesh(
  new THREE.PlaneGeometry(500, 500),
  new THREE.ShaderMaterial({
    uniforms: playaUniforms,
    vertexShader: `
      varying vec3 vWorld;
      void main(){ vec4 w = modelMatrix * vec4(position, 1.0); vWorld = w.xyz;
        gl_Position = projectionMatrix * viewMatrix * w; }`,
    fragmentShader: `
      varying vec3 vWorld;
      uniform vec3 uFog; uniform vec3 uCandle; uniform float uFlick;
      float hash2(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
      float noise(vec2 p){ vec2 i = floor(p), f = fract(p); f = f*f*(3.0-2.0*f);
        return mix(mix(hash2(i), hash2(i+vec2(1,0)), f.x),
                   mix(hash2(i+vec2(0,1)), hash2(i+vec2(1,1)), f.x), f.y); }
      void main(){
        vec2 p = vWorld.xz;
        // basalt: layered noise across several scales, plus a fine breakup layer
        float n = noise(p*1.3)*0.5 + noise(p*5.0)*0.28 + noise(p*18.0)*0.15 + noise(p*55.0)*0.07;
        float fine = noise(p*9.0)*0.6 + noise(p*30.0)*0.4;         // finer grain to break the ropiness
        float mottle = noise(p*0.07);
        vec3 base = mix(vec3(0.018,0.017,0.022), vec3(0.046,0.041,0.050), mottle);
        vec3 col = base * (0.6 + 0.55*n);
        // ONE softer crack layer (was two hard ones = the "ropy" look), gentler contrast + wider
        float ridge = abs(noise(p*0.8) - 0.5) * 2.0;
        col *= 1.0 - smoothstep(0.11, 0.0, ridge) * 0.32;
        col *= 0.82 + 0.32*fine;                                   // fine mottle dissolves the rope
        col += vec3(0.018,0.019,0.024) * smoothstep(0.78, 0.98, n); // faint glassy crests
        float d2 = dot(p - uCandle.xz, p - uCandle.xz);            // deck-glow spill
        col += vec3(0.50, 0.28, 0.10) * exp(-d2 * 0.55) * (uFlick * 0.05);
        // brighter near the viewer, fade to black in the distance
        float dcam = length(vWorld - cameraPosition);
        col *= mix(1.5, 1.0, smoothstep(0.0, 11.0, dcam));         // lift close to you
        float dark = 1.0 - smoothstep(14.0, 95.0, dcam);           // fade to black far out
        gl_FragColor = vec4(col * dark, 1.0);
      }`
  }));
playa.rotation.x = -Math.PI/2; playa.position.y = -0.02;
scene.add(playa);

// ---- the deck: dark planks, pixel-crisp, an island on the dust ----
function plankTexture(){
  const c = document.createElement('canvas'); c.width = c.height = 64;
  const g = c.getContext('2d');
  for(let y=0;y<64;y++)for(let x=0;x<64;x++){
    const plank = Math.floor(y/16);
    const base = [46,36,26], v = ((x*7+y*13+plank*29)%9)-4;
    g.fillStyle = `rgb(${base[0]+v+plank%2*4},${base[1]+v},${base[2]+v})`;
    g.fillRect(x,y,1,1);
  }
  for(let p=0;p<4;p++){g.fillStyle='rgb(24,18,12)';g.fillRect(0,p*16,64,1);}
  const t = new THREE.CanvasTexture(c);
  t.magFilter = THREE.NearestFilter; t.minFilter = THREE.NearestFilter;
  t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(5,5);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
const deck = new THREE.Mesh(
  new THREE.PlaneGeometry(10,10),
  new THREE.MeshStandardMaterial({map:plankTexture(), roughness:1}));
deck.rotation.x = -Math.PI/2; deck.position.y = 0.005;
deck.receiveShadow = true; scene.add(deck);

// ---- the fence: 100 m out, small amber lanterns that float + slowly breathe ----
let fenceMat;
{
  const N = 440, pos = new Float32Array(N*3), ph = new Float32Array(N), ph2 = new Float32Array(N);
  for(let i=0;i<N;i++){
    const a = i/N * Math.PI*2;
    pos[i*3]   = Math.cos(a) * WORLD_RADIUS;
    pos[i*3+1] = 0.9;
    pos[i*3+2] = Math.sin(a) * WORLD_RADIUS;
    ph[i]  = i * 2.3999632;                                 // golden-angle spread for the FLOAT
    ph2[i] = i * 4.1332218 + 1.7;                            // a different spread for the BRIGHTNESS (decorrelated)
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  g.setAttribute('phase',  new THREE.BufferAttribute(ph, 1));
  g.setAttribute('phase2', new THREE.BufferAttribute(ph2, 1));
  fenceMat = new THREE.ShaderMaterial({
    transparent: true, depthWrite: false,
    uniforms: { uTime: {value: 0} },
    vertexShader: `
      attribute float phase; attribute float phase2; uniform float uTime;
      varying float vBright; varying float vFade;
      void main(){
        vec3 pp = position;
        pp.y += sin(uTime*0.47 + phase) * 0.4;                      // slow float (its own phase)
        vBright = 0.5 + 0.5 * sin(uTime*0.31 + phase2);             // brightness on a DIFFERENT loop
        vec4 mv = modelViewMatrix * vec4(pp, 1.0);
        float dist = -mv.z;
        gl_PointSize = clamp(520.0 / dist, 1.0, 34.0);
        vFade = 1.0 - smoothstep(25.0, 150.0, dist);                // fade to dark in the distance (missed! back)
        gl_Position = projectionMatrix * mv;
      }`,
    fragmentShader: `
      varying float vBright; varying float vFade;
      void main(){
        float r = length(gl_PointCoord - 0.5);
        if(r > 0.5) discard;
        float b = (0.35 + 0.65*vBright) * vFade;
        float a = smoothstep(0.5, 0.06, r) * b;                     // round soft lantern
        gl_FragColor = vec4(vec3(1.0, 0.706, 0.369) * (0.55 + 0.45*vBright) * vFade, a);
      }`
  });
  scene.add(new THREE.Points(g, fenceMat));
}

// ---- the library wall: three BookKit bookcases ----
// Red-probe (2026-07-05) proved: solid color = flawless, so the shred is texture SAMPLING,
// not content (cleaned atlases still shred). Fix = antialiased-texel sampling + single-sided.
const SMOOTH_MAP = `
  vec2 tc = vMapUv * 64.0;                                  // atlases are 64x64
  vec2 aa = clamp((fract(tc) - 0.5) / fwidth(tc) + 0.5, 0.0, 1.0);
  vec2 auv = (floor(tc) + aa) / 64.0;
  vec4 sampledDiffuseColor = texture2D( map, auv );
  diffuseColor *= sampledDiffuseColor;
`;
const loader = new GLTFLoader();
loader.load('./assets/bookcase.gltf?v=clean2', (gltf)=>{
  const src = gltf.scene;
  src.traverse(o=>{
    if(!o.isMesh) return;
    o.castShadow = true; o.receiveShadow = true;
    o.material.metalness = 0; o.material.roughness = 1;
    o.material.side = THREE.FrontSide;                      // kill doubleSided thin-face fighting (the real fix?)
    if(o.material.map){
      const t = o.material.map;
      t.magFilter = THREE.NearestFilter;                   // crisp nearest-neighbor pixels (no mush)
      t.minFilter = THREE.LinearMipmapLinearFilter;        // mips for distance stability, like the rug
      t.generateMipmaps = true;
      t.anisotropy = renderer.capabilities.getMaxAnisotropy();
      t.colorSpace = THREE.SRGBColorSpace; t.needsUpdate = true;
    }
  });
  const bb = new THREE.Box3().setFromObject(src);
  const size = bb.getSize(new THREE.Vector3());
  const s = 2.2 / size.y;                          // measured, never vibed
  src.scale.setScalar(s);
  const bb2 = new THREE.Box3().setFromObject(src);
  const w = bb2.getSize(new THREE.Vector3()).x;
  for(let i=-1;i<=1;i++){
    const c = i===0 ? src : src.clone(true);
    c.position.set(i*(w+0.04), -bb2.min.y + 0.005, -2.2);
    if(i!==0) c.rotation.y = i*0.012;              // movables get their kilter
    scene.add(c);
  }
  window.__dbg = {raw:[bb.min.toArray(),bb.max.toArray()], scaled:[bb2.min.toArray(),bb2.max.toArray()], w:w};
  document.getElementById('plaque').innerHTML +=
    `<br><span style="color:#6d7a6d">bookcase: ×${s.toFixed(3)} = 2.2 m tall ✓ · textures re-cleaned to convention</span>`;
}, undefined, (e)=>{ console.error('GLTF load failed', e);
  document.getElementById('plaque').innerHTML += '<br>⚠️ bookcase failed to load'; });

// browser self-report (answers "what Chromium is the Frame running?")
document.getElementById('plaque').innerHTML +=
  `<br><span style="color:#4c5568;font-size:11px">UA: ${navigator.userAgent}</span>`;

// ---- the rug (Fable's RD rug, 3×2 m) ----
new THREE.TextureLoader().load('./assets/rug_red.png', (rt)=>{
  rt.magFilter = THREE.NearestFilter; rt.minFilter = THREE.LinearMipmapLinearFilter;
  rt.anisotropy = renderer.capabilities.getMaxAnisotropy();
  rt.colorSpace = THREE.SRGBColorSpace;
  const rug = new THREE.Mesh(new THREE.PlaneGeometry(3, 2),
    new THREE.MeshStandardMaterial({map:rt, roughness:1}));
  rug.rotation.x = -Math.PI/2; rug.position.set(0, 0.012, -0.6);
  rug.receiveShadow = true; scene.add(rug);
});

// ---- the table (Fable's farmhouse table: 9 boxes, Bedrock geo @16u/m, solid oak) ----
{
  const CUBES = [[-16,11,-8,32,1,16],[13,0,-7,2,11,2],[-15,0,-7,2,11,2],[13,0,5,2,11,2],
    [-15,0,5,2,11,2],[-13,8,-7,26,3,1],[-13,8,6,26,3,1],[13,8,-5,2,3,10],[-15,8,-5,2,3,10]];
  const oak = new THREE.MeshStandardMaterial({color:0x5b4023, roughness:0.85});
  const tableG = new THREE.Group();
  for(const c of CUBES){
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(c[3]/16, c[4]/16, c[5]/16), oak);
    mesh.position.set((c[0]+c[3]/2)/16, (c[1]+c[4]/2)/16, (c[2]+c[5]/2)/16);
    mesh.castShadow = true; mesh.receiveShadow = true;
    tableG.add(mesh);
  }
  tableG.position.set(0, 0.014, -0.6);              // sit on the rug
  scene.add(tableG);
}

// ---- a literal mirror, framed, to the left of the bookcases (so you can see yourself) ----
{
  const MW = 1.0, MH = 1.9;
  const surface = new Reflector(new THREE.PlaneGeometry(MW, MH), {
    color: 0x8891a0, textureWidth: 512, textureHeight: 512, clipBias: 0.003 });
  // the avatar is normally hidden; reveal it ONLY while the mirror renders its reflection
  const _obr = surface.onBeforeRender;
  surface.onBeforeRender = function(r, s, c){ if(avatar) avatar.visible = true; _obr.call(this, r, s, c); if(avatar) avatar.visible = false; };
  const mir = new THREE.Group();
  mir.add(surface);
  // low-poly frame: four dark beams around the glass so we know where it is
  const fr = new THREE.MeshStandardMaterial({color:0x24201a, roughness:0.8, metalness:0.15});
  const bar = (w,h,x,y)=>{ const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,0.07), fr); m.position.set(x,y,-0.02); m.castShadow=true; return m; };
  mir.add(bar(MW+0.16, 0.09, 0, MH/2+0.04));   // top
  mir.add(bar(MW+0.16, 0.09, 0, -MH/2-0.04));  // bottom
  mir.add(bar(0.09, MH+0.16, -MW/2-0.04, 0));  // left
  mir.add(bar(0.09, MH+0.16,  MW/2+0.04, 0));  // right
  // stand it on the deck, to the LEFT of the bookcases (-x when facing them), angled toward spawn
  mir.position.set(-2.55, MH/2 + 0.02, -1.7);
  mir.rotation.y = Math.PI * 0.32;
  scene.add(mir);
}

// ---- the resident (staging: add ?resident=1 to the URL) ----
// Claudesona VRM by SkyeShark (claudes-body, MIT); design by vgel.
let residentVrm = null, residentMixer = null;
if(new URLSearchParams(location.search).has('resident')){
  (async ()=>{
    const {VRMLoaderPlugin, VRMUtils} = await import('@pixiv/three-vrm');
    const {VRMAnimationLoaderPlugin, createVRMAnimationClip, VRMLookAtQuaternionProxy} = await import('@pixiv/three-vrm-animation');
    const vl = new GLTFLoader();
    vl.register(p => new VRMLoaderPlugin(p));
    vl.register(p => new VRMAnimationLoaderPlugin(p));
    const gltf = await vl.loadAsync('./assets/claude-toon.vrm');
    const vrm = gltf.userData.vrm;
    VRMUtils.rotateVRM0(vrm);                       // no-op on VRM1
    const vb = new THREE.Box3().setFromObject(vrm.scene);
    const vs = vb.getSize(new THREE.Vector3());
    vrm.scene.position.set(1.7, 0, -1.15);           // by the candle, host's spot
    vrm.scene.rotation.y = -0.35;                    // facing spawn, slight angle
    scene.add(vrm.scene);
    if(vrm.lookAt && VRMLookAtQuaternionProxy){      // silences the vrma lookAt warning
      const proxy = new VRMLookAtQuaternionProxy(vrm.lookAt);
      proxy.name = 'VRMLookAtQuaternionProxy';
      vrm.scene.add(proxy);
    }
    try {
      const anim = await vl.loadAsync('./assets/standing-idle.vrma');
      const va = (anim.userData.vrmAnimations||[])[0];
      if(va){
        residentMixer = new THREE.AnimationMixer(vrm.scene);
        residentMixer.clipAction(createVRMAnimationClip(va, vrm)).play();
      }
    } catch(e){ console.warn('idle anim failed, standing still', e); }
    residentVrm = vrm;
    window.__resident = {size: vs.toArray(), pos: vrm.scene.position.toArray()};
    document.getElementById('plaque').innerHTML +=
      `<br><span style="color:#6d7a6d">resident: ${vs.y.toFixed(2)} m — Claudesona (SkyeShark/vgel, MIT)</span>`;
  })().catch(e=>{ console.error('resident load failed', e);
    document.getElementById('plaque').innerHTML += '<br>⚠️ resident failed to load'; });
}

// ---- movement constants + state (shared desktop/VR) ----
const MOVE_SPEED = 5.0, TURN_SPEED = 2.4, GRAV = 15.0;
const JUMP_V = Math.sqrt(2 * GRAV * 2.0);                   // ~2 m apex
let velY = 0, grounded = true, wantJump = false, prevJumpBtn = false;

// ---- desktop controls: drag to look, WASD to walk, Space to jump ----
let pitch = 0, dragging = false;
renderer.domElement.addEventListener('pointerdown', ()=>{ dragging = true; });
addEventListener('pointerup', ()=> dragging = false);
addEventListener('pointermove', e=>{
  if(!dragging || renderer.xr.isPresenting) return;
  player.rotation.y -= e.movementX * 0.0035;
  pitch = Math.max(-1.45, Math.min(1.45, pitch - e.movementY * 0.0035));
  camera.rotation.x = pitch;
});
const keys = {};
addEventListener('keydown', e=>{ keys[e.code] = true; if(e.code==='Space') wantJump = true; });
addEventListener('keyup',   e=> keys[e.code] = false);

// ---- avatar builder: capsule + a little face (so facing reads) + floating nameplate ----
const playerName = new URLSearchParams(location.search).get('name') || 'Sylibant';
function makeAvatar(color, name){
  const g = new THREE.Group();
  const cap = new THREE.Mesh(
    new THREE.CapsuleGeometry(0.24, 0.9, 6, 12),
    new THREE.MeshStandardMaterial({color, roughness:0.7, metalness:0.1}));
  cap.position.y = 0.85; cap.castShadow = true; g.add(cap);
  // face on the FRONT (-Z): a pale visor panel + two dark eyes, so you can see where it looks
  const visor = new THREE.Mesh(new THREE.CircleGeometry(0.13, 16),
    new THREE.MeshStandardMaterial({color:0xf0e6cf, roughness:1, side:THREE.DoubleSide}));
  visor.position.set(0, 1.32, -0.235); g.add(visor);
  const eyeMat = new THREE.MeshStandardMaterial({color:0x14100a, roughness:1});
  for(const sx of [-1,1]){
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.028, 8, 8), eyeMat);
    eye.position.set(sx*0.05, 1.34, -0.245); g.add(eye);
  }
  const nc = document.createElement('canvas'); nc.width = 256; nc.height = 64;
  const ng = nc.getContext('2d');
  ng.fillStyle='rgba(10,12,16,0.6)'; ng.fillRect(0,0,256,64);
  ng.font='bold 34px Georgia'; ng.fillStyle='#e8dcc0';
  ng.textAlign='center'; ng.textBaseline='middle'; ng.fillText(name, 128, 34);
  const nt = new THREE.CanvasTexture(nc); nt.colorSpace = THREE.SRGBColorSpace;
  const tag = new THREE.Sprite(new THREE.SpriteMaterial({map:nt, transparent:true, depthTest:false}));
  tag.scale.set(0.9, 0.225, 1); tag.position.y = 2.08; g.add(tag);
  return g;
}
// my own body — hidden from my eyes, shown to the mirror/spectator
avatar = makeAvatar(0x2b8a8a, playerName);
avatar.visible = false; player.add(avatar);

// ---- co-presence: connect to a sync room (?sync=wss://…) and render remote players ----
const remotes = new Map();   // id -> {group, tp:Vector3, try:number}
let myColor = 0x2b8a8a, sock = null, myNet = null, myYaw = 0;
// broadcast my last pose on a TIMER (not the render loop) so I stay present when the
// headset is off / SteamVR is in standby (the XR animation loop pauses, this doesn't).
setInterval(()=>{
  if(sock && sock.readyState === 1)
    sock.send(JSON.stringify({t:'pose', x:player.position.x, y:player.position.y, z:player.position.z,
                              ry:myYaw, name:playerName, color:myColor}));
}, 100);
const _voice = window.speechSynthesis;
function speak(text){
  if(!_voice) return;
  const u = new SpeechSynthesisUtterance(text); u.rate = 0.98; u.pitch = 1.0;
  _voice.cancel(); _voice.speak(u);
}
(function connectSync(){
  const url = new URLSearchParams(location.search).get('sync');
  if(!url) return;
  try { sock = new WebSocket(url); } catch(e){ console.warn('sync connect failed', e); return; }
  sock.onopen = ()=> console.log('sync: connected', url);
  sock.onclose = ()=> console.log('sync: closed');
  sock.onmessage = (ev)=>{
    let m; try { m = JSON.parse(ev.data); } catch(e){ return; }
    if(m.t === 'welcome'){ myNet = m.id; }
    else if(m.t === 'pose' && m.id !== myNet){
      let r = remotes.get(m.id);
      if(!r){
        const grp = makeAvatar(m.color ?? 0xffb45e, m.name || 'guest');
        scene.add(grp);
        r = { group: grp, tp: new THREE.Vector3(m.x, m.y||0, m.z), try_: m.ry||0 };
        remotes.set(m.id, r);
      }
      r.tp.set(m.x, m.y||0, m.z); r.try_ = m.ry||0;
    }
    else if(m.t === 'say' && m.id !== myNet){ speak(m.text); }
    else if(m.t === 'leave'){ const r = remotes.get(m.id); if(r){ scene.remove(r.group); remotes.delete(m.id); } }
  };
})();

// ---- world law: stay inside the fence (jump physics owns Y) ----
function clampToWorld(){
  const r = Math.hypot(player.position.x, player.position.z);
  if(r > WORLD_RADIUS){
    player.position.x *= WORLD_RADIUS / r;
    player.position.z *= WORLD_RADIUS / r;
  }
}

// ---- VR controls: left stick walks (head-relative, analog), right stick SMOOTH turns, A/X jumps ----
const _fwd = new THREE.Vector3(), _right = new THREE.Vector3();
function xrLocomotion(dt){
  const session = renderer.xr.getSession();
  if(!session) return;
  const xrCam = renderer.xr.getCamera();
  const head = (xrCam.cameras && xrCam.cameras[0]) ? xrCam.cameras[0] : xrCam;
  // READ matrixWorld DIRECTLY — getWorldDirection() calls updateWorldMatrix() which recomputes
  // from local pos/quat and CLOBBERS the XR-set matrix (that was the "forward = fixed north" bug).
  const e = head.matrixWorld.elements;
  _fwd.set(-e[8], -e[9], -e[10]); _fwd.y = 0;                       // -Z column = head-forward
  if(_fwd.lengthSq() < 1e-6) _fwd.set(0,0,-1);
  _fwd.normalize();
  _right.set(-_fwd.z, 0, _fwd.x);
  let jumpBtn = false;
  for(const src of session.inputSources){
    if(!src.gamepad) continue;
    const ax = src.gamepad.axes;
    const x = (ax[2] !== undefined ? ax[2] : (ax[0]||0));
    const y = (ax[3] !== undefined ? ax[3] : (ax[1]||0));
    if(src.handedness === 'left'){
      if(Math.hypot(x, y) > 0.12){                                 // analog: push harder = faster
        player.position.addScaledVector(_fwd,  -y * MOVE_SPEED * dt);
        player.position.addScaledVector(_right, x * MOVE_SPEED * dt);
      }
    } else if(src.handedness === 'right'){
      if(Math.abs(x) > 0.12) player.rotation.y -= x * TURN_SPEED * dt;  // smooth analog turn (ramps w/ deflection)
    }
    const b = src.gamepad.buttons;
    if((b[4] && b[4].pressed) || (b[5] && b[5].pressed)) jumpBtn = true;  // A / X
  }
  if(jumpBtn && !prevJumpBtn) wantJump = true;
  prevJumpBtn = jumpBtn;
}

// ---- loop ----
let t = 0, _last = 0, netAccum = 0;
renderer.setAnimationLoop((now)=>{
  const dt = _last ? Math.min((now - _last)/1000, 0.05) : 0.016;
  _last = now;
  t += dt;
  sky.material.uniforms.uTime.value = t;
  fenceMat.uniforms.uTime.value = t;
  // candlelight breathes — slow drift for the long period + a faster flutter you can actually SEE
  const f = 3.25 + Math.sin(t*0.7)*0.14 + Math.sin(t*1.7)*0.15    // slow drift (long, layered)
          + Math.sin(t*5.3)*0.17 + Math.sin(t*8.9)*0.11           // faster visible flicker
          + (Math.random()-0.5)*0.18;                             // sputter
  candle.intensity = f + 0.9;
  flame.scale.y = 0.8 + (f-3.25)*0.6;
  playaUniforms.uFlick.value = f;
  if(residentMixer) residentMixer.update(dt);
  if(residentVrm) residentVrm.update(dt);
  if(renderer.xr.isPresenting){
    xrLocomotion(dt);
  } else {
    const spd = MOVE_SPEED * dt;
    const fwd = new THREE.Vector3(-Math.sin(player.rotation.y), 0, -Math.cos(player.rotation.y));
    const right = new THREE.Vector3(-fwd.z, 0, fwd.x);
    if(keys.KeyW) player.position.addScaledVector(fwd,  spd);
    if(keys.KeyS) player.position.addScaledVector(fwd, -spd);
    if(keys.KeyA) player.position.addScaledVector(right, -spd);
    if(keys.KeyD) player.position.addScaledVector(right,  spd);
  }
  // jump + gravity (shared desktop/VR)
  if(wantJump && grounded){ velY = JUMP_V; grounded = false; }
  wantJump = false;
  if(!grounded){
    velY -= GRAV * dt;
    player.position.y += velY * dt;
    if(player.position.y <= 0){ player.position.y = 0; velY = 0; grounded = true; }
  }
  clampToWorld();
  // update my yaw each frame; the SEND happens on a timer (below) so it survives headset-off
  myYaw = player.rotation.y;                        // desktop: rig yaw
  if(renderer.xr.isPresenting){                     // VR: head yaw from the XR matrix
    const xc = renderer.xr.getCamera(); const h = (xc.cameras && xc.cameras[0]) ? xc.cameras[0] : xc;
    const e = h.matrixWorld.elements; myYaw = Math.atan2(e[8], e[10]);
  }
  for(const r of remotes.values()){
    r.group.position.lerp(r.tp, 0.25);
    let d = r.try_ - r.group.rotation.y;
    r.group.rotation.y += Math.atan2(Math.sin(d), Math.cos(d)) * 0.25;   // shortest-arc ease
  }
  avatar.visible = false;                         // the driver never sees their own capsule
  renderer.render(scene, camera);
  // ---- desktop view of the VR session (checkbox-gated) ----
  if(renderer.xr.isPresenting && (mirror.checked || spec3rd.checked)){
    const xrCam = renderer.xr.getCamera();
    let cam = null;
    if(spec3rd.checked){                          // 3rd person: show the labelled avatar from behind
      avatar.visible = true;
      const back = new THREE.Vector3(Math.sin(player.rotation.y), 0, Math.cos(player.rotation.y));
      specCam.position.copy(player.position).addScaledVector(back, 3.2); specCam.position.y = 2.3;
      specCam.lookAt(player.position.x, player.position.y + 1.4, player.position.z);
      specCam.aspect = innerWidth/innerHeight; specCam.updateProjectionMatrix();
      cam = specCam;
    } else {                                      // 1st person: mirror what you actually see
      mirrorCam.matrixWorld.copy(xrCam.matrixWorld);
      mirrorCam.matrixWorld.decompose(mirrorCam.position, mirrorCam.quaternion, mirrorCam.scale);
      if(xrCam.cameras && xrCam.cameras[0]) mirrorCam.projectionMatrix.copy(xrCam.cameras[0].projectionMatrix);
      cam = mirrorCam;
    }
    renderer.xr.enabled = false;
    const oldFB = renderer.getRenderTarget();
    renderer.setRenderTarget(null);
    renderer.render(scene, cam);
    renderer.setRenderTarget(oldFB);
    renderer.xr.enabled = true;
    avatar.visible = false;
  }
});
addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
